# Railway deployment configuration for Glock
# Model B Architecture - Stateless LLM Proxy

[build]
builder = "dockerfile"
dockerfilePath = "infra/docker/gateway.Dockerfile"

[deploy]
startCommand = "uvicorn apps.server.src.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 2

[service]
internalPort = 8000
